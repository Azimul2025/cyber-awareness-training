<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- Prevent search-engine indexing -->
    <meta name="robots" content="noindex, nofollow, noarchive">

    <title>Cybersecurity Training Simulation</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #ffffff;
            color: #111111;
            font-family: Arial, Helvetica, sans-serif;
        }

        .training-banner {
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
            padding: 12px 15px;
            background: #8b0000;
            color: #ffffff;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .page {
            width: 100%;
            max-width: 780px;
            min-height: 720px;
            margin: 0 auto;
            padding: 90px 33px 30px;
        }

        .login-title {
            margin-bottom: 30px;
            font-size: 21px;
            font-weight: 600;
        }

        .input-field {
            display: block;
            width: 100%;
            height: 74px;
            margin-bottom: 17px;
            padding: 0 20px;
            background: #ffffff;
            border: 1.5px solid #ccd0d5;
            border-radius: 20px;
            color: #111111;
            font-size: 18px;
            outline: none;
        }

        .input-field:focus {
            border-color: #0866ff;
        }

        .input-field::placeholder {
            color: #5f6368;
            opacity: 1;
        }

        .login-button,
        .create-button {
            display: block;
            width: 100%;
            height: 57px;
            border-radius: 30px;
            font-size: 19px;
            cursor: pointer;
        }

        .login-button {
            margin-top: 14px;
            background: #0866e8;
            border: none;
            color: #ffffff;
        }

        .login-button:hover {
            background: #075bcc;
        }

        .forgotten-link {
            margin-top: 29px;
            text-align: center;
            font-size: 19px;
            cursor: pointer;
        }

        .bottom-section {
            margin-top: 80px;
        }

        .create-button {
            background: #ffffff;
            border: 1.5px solid #0866ff;
            color: #0866ff;
        }

        .brand {
            margin-top: 31px;
            color: #323232;
            text-align: center;
            font-size: 20px;
        }

        .brand-symbol {
            margin-right: 5px;
            color: #0866ff;
            font-weight: 700;
        }

        .result-box {
            display: none;
            margin-top: 25px;
            padding: 18px;
            background: #fff4e5;
            border-left: 6px solid #f59e0b;
            border-radius: 7px;
            font-size: 15px;
            line-height: 1.6;
        }

        .result-title {
            color: #8b0000;
            font-size: 18px;
            font-weight: 700;
        }

        .safety-box {
            margin-top: 25px;
            padding: 14px;
            background: #eef5ff;
            border-radius: 7px;
            color: #333333;
            text-align: center;
            font-size: 13px;
            line-height: 1.5;
        }

        .consent-row {
            display: flex;
            gap: 9px;
            align-items: flex-start;
            margin-top: 15px;
            color: #444444;
            font-size: 13px;
            line-height: 1.4;
        }

        .consent-row input {
            margin-top: 3px;
        }

        @media (max-width: 600px) {
            .page {
                min-height: 680px;
                padding: 65px 22px 25px;
            }

            .input-field {
                height: 64px;
            }

            .bottom-section {
                margin-top: 60px;
            }

            .training-banner {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="training-banner">
        CYBERSECURITY TRAINING SIMULATION — DO NOT ENTER REAL INFORMATION
    </div>

    <main class="page">

        <div class="login-title">
            Log in to DemoConnect
        </div>

        <form
            id="trainingForm"
            autocomplete="off"
            onsubmit="runTrainingDemo(event)"
        >

            <input
                id="username"
                class="input-field"
                type="text"
                placeholder="Email address or mobile number"
                autocomplete="off"
                maxlength="80"
            >

            <input
                id="password"
                class="input-field"
                type="password"
                placeholder="Fictional password"
                autocomplete="new-password"
                maxlength="80"
            >

            <div class="consent-row">
                <input id="consent" type="checkbox">

                <label for="consent">
                    I confirm that I am using fictional information and not
                    an actual personal or official password.
                </label>
            </div>

            <button class="login-button" type="submit">
                Log in
            </button>

        </form>

        <div
            class="forgotten-link"
            onclick="showGeneralMessage()"
            role="button"
            tabindex="0"
        >
            Forgotten password?
        </div>

        <div id="resultBox" class="result-box"></div>

        <div class="bottom-section">

            <button
                class="create-button"
                type="button"
                onclick="showGeneralMessage()"
            >
                Create new training account
            </button>

            <div class="brand">
                <span class="brand-symbol">∞</span>
                DemoConnect
            </div>

            <div class="safety-box">
                This page works only inside the user’s browser. It contains no
                server connection, database, analytics, tracking script or
                credential-submission function.
            </div>

        </div>

    </main>

    <script>
        function escapeHTML(value) {
            return value.replace(/[&<>"']/g, function(character) {
                const entities = {
                    "&": "&amp;",
                    "<": "&lt;",
                    ">": "&gt;",
                    '"': "&quot;",
                    "'": "&#039;"
                };

                return entities[character];
            });
        }

        function runTrainingDemo(event) {
            event.preventDefault();

            const usernameField =
                document.getElementById("username");

            const passwordField =
                document.getElementById("password");

            const consentField =
                document.getElementById("consent");

            const resultBox =
                document.getElementById("resultBox");

            const username =
                usernameField.value.trim();

            const passwordLength =
                passwordField.value.length;

            resultBox.style.display = "block";

            if (!consentField.checked) {
                resultBox.innerHTML = `
                    <span class="result-title">
                        Training confirmation required
                    </span>

                    <p>
                        Confirm that you are using fictional information
                        before continuing.
                    </p>
                `;

                passwordField.value = "";
                return;
            }

            if (username === "" || passwordLength === 0) {
                resultBox.innerHTML = `
                    <span class="result-title">
                        Use fictional training information
                    </span>

                    <p>
                        Enter a fictional username and fictional password
                        to complete the exercise.
                    </p>
                `;

                passwordField.value = "";
                return;
            }

            const safeUsername =
                escapeHTML(username);

            resultBox.innerHTML = `
                <span class="result-title">
                    This was a phishing-awareness simulation
                </span>

                <p>
                    The page persuaded you to enter information because it
                    contained a familiar layout, login fields, colours and
                    buttons.
                </p>

                <p>
                    <strong>Fictional username entered:</strong><br>
                    ${safeUsername}
                </p>

                <p>
                    <strong>Password:</strong><br>
                    Immediately cleared, never displayed and never stored.
                </p>

                <p>
                    <strong>Password length:</strong><br>
                    ${passwordLength} characters
                </p>

                <p>
                    A professional appearance does not prove that a webpage
                    is genuine. Check the complete address and actual domain
                    before entering information.
                </p>

                <p>
                    <strong>
                        Never enter real personal, official, financial or
                        social-media credentials through an unexpected link.
                    </strong>
                </p>
            `;

            // Remove the password from the form immediately.
            passwordField.value = "";

            // Remove the local variable value.
            passwordLengthValue = null;
        }

        function showGeneralMessage() {
            const resultBox =
                document.getElementById("resultBox");

            resultBox.style.display = "block";

            resultBox.innerHTML = `
                <span class="result-title">
                    Training simulation only
                </span>

                <p>
                    This button is not connected to any real account system.
                    Fraudulent pages may include familiar buttons and links
                    simply to make the page appear trustworthy.
                </p>
            `;
        }
    </script>

</body>
</html>
